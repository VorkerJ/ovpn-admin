version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused

  settings:
    errcheck:
      # defer Close() returning error is standard Go practice — ignore
      # fmt.Fprintf/Fprint on http.ResponseWriter — error means client disconnected, nothing to do
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
        - (net.Conn).Close
        - (net.Listener).Close
        - (*bufio.Writer).Flush
        - fmt.Fprintf
        - fmt.Fprint
        - fmt.Fprintln
    staticcheck:
      checks:
        - "all"
        - "-SA1019"  # deprecated ioutil — lots of it in legacy code
        - "-ST1003"  # naming: ApiUrl vs APIUrl — legacy identifiers
        - "-ST1005"  # error string capitalization — intentional Russian strings
        - "-ST1008"  # error as last return value — changing breaks all callers


