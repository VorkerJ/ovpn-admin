# ================================================================
# openvpn-admin Helm chart — default values
# ================================================================

# ----------------------------------------------------------------
# ovpn-admin UI
# ----------------------------------------------------------------
ovpnAdmin:
  image:
    repository: ghcr.io/vorkerj/ovpn-admin/ovpn-admin
    # tag: defaults to .Chart.AppVersion when empty
    tag: ""
    pullPolicy: IfNotPresent

  port: 8080

  # CCD (client-config-dir): per-user static IPs and push routes
  ccdEnabled: true

  # Prometheus metrics endpoint
  metricsEnabled: true
  metricsPath: "/metrics"

  # PKI storage backend: "filesystem" or "kubernetes.secrets"
  # kubernetes.secrets stores all certs in etcd — no PVC needed
  storageBackend: "kubernetes.secrets"

  # Admin UI authentication via htpasswd file (bcrypt).
  # Name of a K8s Secret with key "htpasswd".
  # If empty — a random password is generated at startup and printed to logs.
  # Create: htpasswd -c -B /tmp/htpasswd admin
  #         kubectl create secret generic ovpn-admin-ui-auth --from-file=htpasswd=/tmp/htpasswd
  adminHtpasswdSecret: ""

# ----------------------------------------------------------------
# OpenVPN server
# ----------------------------------------------------------------
openvpn:
  image:
    repository: ghcr.io/vorkerj/ovpn-admin/openvpn
    # tag: defaults to .Chart.AppVersion when empty
    tag: ""
    pullPolicy: IfNotPresent

  # External hostname or IP used in generated .ovpn client configs
  # serverName: vpn.example.com

  proto: tcp
  port: 1194

  # VPN subnet (address/mask)
  network: "172.16.100.0"
  networkMask: "255.255.255.0"
  networkPrefix: "172.16.100.0/24"

  logLevel: 3

  # Expose OpenVPN port: HostPort | LoadBalancer | ExternalIP
  inlet: HostPort
  hostPort: 1194
  # externalIP: 1.2.3.4      # for ExternalIP inlet
  # externalPort: 1194        # for LoadBalancer / ExternalIP inlet

# ----------------------------------------------------------------
# Service for admin UI
# ----------------------------------------------------------------
service:
  type: ClusterIP
  port: 8080

# ----------------------------------------------------------------
# Ingress for admin UI
# ----------------------------------------------------------------
ingress:
  enabled: false
  className: ""
  hostname: ""
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt

# ----------------------------------------------------------------
# RBAC
# ----------------------------------------------------------------
rbac:
  create: true
  serviceAccountName: ovpn-admin

# ----------------------------------------------------------------
# Resources
# ----------------------------------------------------------------
resources:
  openvpn:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  ovpnAdmin:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# One replica — OpenVPN is stateful, PKI can't be shared between pods
replicaCount: 1

nodeSelector: {}
tolerations: []

# ----------------------------------------------------------------
# ServiceMonitor for Prometheus Operator (optional)
# ----------------------------------------------------------------
serviceMonitor:
  enabled: false
  interval: 30s
  namespace: monitoring
