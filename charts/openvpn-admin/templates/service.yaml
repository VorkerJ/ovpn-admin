---
# ── Admin UI service ────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: {{ include "openvpn-admin.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openvpn-admin.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.ovpnAdmin.port }}
      protocol: TCP
  selector:
    {{- include "openvpn-admin.selectorLabels" . | nindent 4 }}

{{- if eq .Values.openvpn.inlet "LoadBalancer" }}
---
# ── OpenVPN external LoadBalancer ───────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: {{ include "openvpn-admin.fullname" . }}-openvpn
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openvpn-admin.labels" . | nindent 4 }}
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  ports:
    - name: openvpn
      port: {{ .Values.openvpn.externalPort | default .Values.openvpn.port }}
      targetPort: {{ .Values.openvpn.port }}
      protocol: {{ .Values.openvpn.proto | upper }}
  selector:
    {{- include "openvpn-admin.selectorLabels" . | nindent 4 }}
{{- else if eq .Values.openvpn.inlet "ExternalIP" }}
---
# ── OpenVPN external ExternalIP ─────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: {{ include "openvpn-admin.fullname" . }}-openvpn
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openvpn-admin.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  externalIPs:
    - {{ required "openvpn.externalIP is required for ExternalIP inlet" .Values.openvpn.externalIP }}
  ports:
    - name: openvpn
      port: {{ .Values.openvpn.externalPort | default .Values.openvpn.port }}
      targetPort: {{ .Values.openvpn.port }}
      protocol: {{ .Values.openvpn.proto | upper }}
  selector:
    {{- include "openvpn-admin.selectorLabels" . | nindent 4 }}
{{- end }}

{{- if .Values.serviceMonitor.enabled }}
---
# ── ServiceMonitor for Prometheus Operator ──────────────────────────────────
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "openvpn-admin.fullname" . }}
  namespace: {{ .Values.serviceMonitor.namespace }}
  labels:
    {{- include "openvpn-admin.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "openvpn-admin.selectorLabels" . | nindent 6 }}
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  endpoints:
    - port: http
      path: {{ .Values.ovpnAdmin.metricsPath }}
      interval: {{ .Values.serviceMonitor.interval }}
{{- end }}
