{{/*
  Authentication is handled by ovpn-admin itself via --admin.htpasswd-file.
  Pass the name of an existing K8s Secret to ovpnAdmin.adminHtpasswdSecret in values.yaml.

  Create the secret:
    htpasswd -c -B /tmp/htpasswd admin
    kubectl create secret generic ovpn-admin-ui-auth \
      --from-file=htpasswd=/tmp/htpasswd \
      -n <namespace>
*/}}
