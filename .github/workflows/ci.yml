          </body>
          </html>
          HTMLEOF
          sed -i "s|REPO_URL_PLACEHOLDER|${REPO_URL}|g" pages/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: pages/

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
