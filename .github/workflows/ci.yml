                  <tr><td><code>openvpn.proto</code></td><td>Protocol: <code>udp</code> or <code>tcp</code></td><td><code>udp</code></td></tr>
                  <tr><td><code>openvpn.port</code></td><td>OpenVPN listen port</td><td><code>1194</code></td></tr>
