              a { color: var(--accent); text-decoration: none; }
              a:hover { text-decoration: underline; }

              header {
                border-bottom: 1px solid var(--border);
                padding: 2rem 1.5rem 2.5rem;
                text-align: center;
              }

              .logo {
                font-size: 2.4rem;
                font-weight: 700;
                letter-spacing: -0.5px;
              }
              .logo span { color: var(--accent); }

              .tagline {
                color: var(--muted);
                margin-top: .5rem;
                font-size: 1.1rem;
              }

              .badges {
                display: flex;
                gap: .6rem;
                justify-content: center;
                flex-wrap: wrap;
                margin-top: 1.2rem;
              }
              .badges img { height: 20px; }

              main {
                max-width: 860px;
                margin: 0 auto;
                padding: 3rem 1.5rem 4rem;
              }

              h2 {
                font-size: 1.25rem;
                font-weight: 600;
                margin-bottom: 1rem;
                padding-bottom: .5rem;
                border-bottom: 1px solid var(--border);
                color: var(--text);
              }
              section { margin-bottom: 3rem; }

              .cards {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
                gap: 1rem;
              }
              .card {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 8px;
                padding: 1.1rem 1.2rem;
              }
              .card-icon { font-size: 1.4rem; margin-bottom: .4rem; }
              .card-title { font-weight: 600; font-size: .95rem; margin-bottom: .3rem; }
              .card-desc { color: var(--muted); font-size: .875rem; }

              .code-block {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 8px;
                padding: 1.2rem 1.4rem;
                overflow-x: auto;
                margin-bottom: 1rem;
              }
              .code-block pre {
                font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
                font-size: .875rem;
                white-space: pre;
                color: var(--text);
              }
              .code-block .comment { color: var(--muted); }
              .code-block .cmd { color: var(--accent2); }
              .code-block .flag { color: var(--accent3); }
              .code-block .val { color: var(--accent); }

              .steps { display: flex; flex-direction: column; gap: 1rem; }
              .step {
                display: flex;
                gap: 1rem;
                align-items: flex-start;
              }
              .step-num {
                flex-shrink: 0;
                width: 28px; height: 28px;
                border-radius: 50%;
                background: var(--accent);
                color: #000;
                font-weight: 700;
                font-size: .85rem;
                display: flex; align-items: center; justify-content: center;
              }
              .step-body { flex: 1; }
              .step-title { font-weight: 600; margin-bottom: .4rem; }
              .step-desc { color: var(--muted); font-size: .9rem; }

              table {
                width: 100%;
                border-collapse: collapse;
                font-size: .9rem;
              }
              th {
                text-align: left;
                padding: .6rem .8rem;
                border-bottom: 1px solid var(--border);
                color: var(--muted);
                font-weight: 500;
              }
              td {
                padding: .6rem .8rem;
                border-bottom: 1px solid var(--border);
              }
              tr:last-child td { border-bottom: none; }
              code {
                font-family: "SFMono-Regular", Consolas, monospace;
                font-size: .85em;
                background: var(--tag-bg);
                padding: .15em .4em;
                border-radius: 4px;
                color: var(--accent3);
              }

              footer {
                border-top: 1px solid var(--border);
                text-align: center;
                padding: 1.5rem;
                color: var(--muted);
                font-size: .875rem;
              }
              footer a { color: var(--muted); }
              footer a:hover { color: var(--accent); text-decoration: none; }
            </style>
          </head>
          <body>

          <header>
            <div class="logo">&#x1F512; <span>ovpn-admin</span></div>
            <div class="tagline">Simple web UI to manage OpenVPN users, certificates &amp; routes in Kubernetes</div>
            <div class="badges">
              <img src="https://img.shields.io/badge/Made%20with-Claude-8A2BE2?logo=anthropic" alt="Made with Claude" />
              <a href="REPO_URL_PLACEHOLDER/actions/workflows/ci.yml"><img src="https://github.com/VorkerJ/ovpn-admin/actions/workflows/ci.yml/badge.svg" alt="CI" /></a>
              <a href="REPO_URL_PLACEHOLDER/releases"><img src="https://img.shields.io/github/v/release/VorkerJ/ovpn-admin" alt="Release" /></a>
              <a href="https://github.com/VorkerJ/ovpn-admin/pkgs/container/ovpn-admin%2Fovpn-admin"><img src="https://img.shields.io/badge/ghcr.io-ovpn--admin-blue?logo=docker" alt="Docker" /></a>
              <img src="https://img.shields.io/badge/go-1.25-00ADD8?logo=go" alt="Go" />
              <a href="REPO_URL_PLACEHOLDER/blob/master/LICENSE"><img src="https://img.shields.io/github/license/VorkerJ/ovpn-admin" alt="License" /></a>
            </div>
          </header>

          <main>

            <section>
              <h2>Features</h2>
              <div class="cards">
                <div class="card">
                  <div class="card-icon">&#x1F512;</div>
                  <div class="card-title">Web UI Authentication</div>
                  <div class="card-desc">htpasswd-based login with bcrypt. Multi-admin support. Auto-generates password on first start.</div>
                </div>
                <div class="card">
                  <div class="card-icon">&#x1F464;</div>
                  <div class="card-title">User Management</div>
                  <div class="card-desc">Add, delete, revoke, restore, and rotate user certificates from a clean web interface.</div>
                </div>
                <div class="card">
                  <div class="card-icon">&#x1F4C4;</div>
                  <div class="card-title">Config Generation</div>
                  <div class="card-desc">Download ready-to-use <code>.ovpn</code> config files for each user instantly.</div>
                </div>
                <div class="card">
                  <div class="card-icon">&#x2601;&#xFE0F;</div>
                  <div class="card-title">Kubernetes Native</div>
                  <div class="card-desc">PKI stored in K8s Secrets (etcd) — no PVC required. Helm chart included.</div>
                </div>
                <div class="card">
                  <div class="card-icon">&#x1F4CA;</div>
                  <div class="card-title">Prometheus Metrics</div>
                  <div class="card-desc">Certificate expiry, connected users, per-user traffic — all exposed at <code>/metrics</code>.</div>
                </div>
                <div class="card">
                  <div class="card-icon">&#x1F5FA;&#xFE0F;</div>
                  <div class="card-title">CCD &amp; Static IPs</div>
                  <div class="card-desc">Per-user client-config-dir with static IP assignment and custom push routes with validation.</div>
                </div>
              </div>
            </section>

            <section>
              <h2>Install via Helm</h2>
              <div class="steps">
                <div class="step">
                  <div class="step-num">1</div>
                  <div class="step-body">
                    <div class="step-title">Add the Helm repository</div>
                    <div class="code-block">
                      <pre><span class="cmd">helm repo add</span> ovpn-admin https://vorkerj.github.io/ovpn-admin
          <span class="cmd">helm repo update</span></pre>
                    </div>
                  </div>
                </div>
                <div class="step">
                  <div class="step-num">2</div>
                  <div class="step-body">
                    <div class="step-title">Create admin password secret</div>
                    <div class="code-block">
                      <pre><span class="cmd">htpasswd</span> <span class="flag">-c -B</span> /tmp/htpasswd admin
          <span class="cmd">kubectl create secret generic</span> ovpn-admin-ui-auth \
            <span class="flag">--from-file</span>=<span class="val">htpasswd</span>=/tmp/htpasswd \
            <span class="flag">-n</span> vpn</pre>
                    </div>
                  </div>
                </div>
                <div class="step">
                  <div class="step-num">3</div>
                  <div class="step-body">
                    <div class="step-title">Install the chart</div>
                    <div class="code-block">
                      <pre><span class="cmd">helm upgrade --install</span> ovpn-admin ovpn-admin/openvpn-admin \
            <span class="flag">--namespace</span> vpn <span class="flag">--create-namespace</span> \
            <span class="flag">--set</span> <span class="val">ovpnAdmin.adminHtpasswdSecret</span>=ovpn-admin-ui-auth</pre>
                    </div>
                    <div class="step-desc">Or use a <code>values.yaml</code> file: <code>helm upgrade --install ovpn-admin ovpn-admin/openvpn-admin -f my-values.yaml</code></div>
                  </div>
                </div>
              </div>
            </section>

            <section>
