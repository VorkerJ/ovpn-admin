name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

env:
  REGISTRY: ghcr.io

jobs:
  # ── Build ovpn-admin image ──────────────────────────────────────────────────
  build-ovpn-admin:
    name: Build ovpn-admin image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/ovpn-admin
          tags: |
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ovpn-admin
          platforms: ${{ github.ref_type == 'tag' && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Build openvpn image ─────────────────────────────────────────────────────
  build-openvpn:
    name: Build openvpn image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/openvpn
          tags: |
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.openvpn
          platforms: ${{ github.ref_type == 'tag' && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Release + Helm chart on GitHub Pages ───────────────────────────────────
  # .tgz attaches to the GitHub Release; index.yaml is served via Pages.
  # Pages source must be set to "GitHub Actions" in repo settings.
  release-and-chart:
    name: Release & Publish Chart
    runs-on: ubuntu-latest
    needs: [build-ovpn-admin, build-openvpn]
    if: github.ref_type == 'tag'
    permissions:
      contents: write   # create release, upload assets
      pages: write      # deploy to GitHub Pages
      id-token: write   # OIDC token for Pages deploy
    env:
      CHART_VERSION: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.0

      # Package the chart; the .tgz will be a release asset.
      # index.yaml will reference the GitHub Releases download URL.
      - name: Package chart
        run: |
          helm package charts/openvpn-admin \
            --version "$CHART_VERSION" \
            --app-version "$CHART_VERSION"

      # Create (or update) the GitHub Release and attach the .tgz
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: "openvpn-admin-*.tgz"

      # Fetch the existing index.yaml from Pages so we can merge old entries.
      # If Pages is not yet published this step silently succeeds with no file.
      - name: Fetch existing index.yaml
        env:
          PAGES_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: |
          mkdir -p pages chart-pkg
          mv openvpn-admin-*.tgz chart-pkg/
          curl -sf "$PAGES_URL/index.yaml" -o pages/index.yaml || true

      # Generate index.yaml where each entry URL points to the GitHub Releases
      # download URL so the .tgz files never need to live in Pages storage.
      - name: Generate Helm repo index
        env:
          RELEASE_DOWNLOAD_URL: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}
        run: |
          if [ -f pages/index.yaml ]; then
            helm repo index chart-pkg \
              --url "$RELEASE_DOWNLOAD_URL" \
              --merge pages/index.yaml
          else
            helm repo index chart-pkg \
              --url "$RELEASE_DOWNLOAD_URL"
          fi
          cp chart-pkg/index.yaml pages/index.yaml

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages/

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
