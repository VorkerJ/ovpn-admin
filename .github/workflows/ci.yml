name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

env:
  REGISTRY: ghcr.io

jobs:
  # ── Tests ───────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Display coverage
        run: go tool cover -func=coverage.out

  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          args: --timeout=10m

  # ── Build ovpn-admin image ──────────────────────────────────────────────────
  build-ovpn-admin:
    name: Build ovpn-admin image
    runs-on: ubuntu-latest
    needs: [test, lint]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/ovpn-admin
          tags: |
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.ovpn-admin
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Build openvpn image ─────────────────────────────────────────────────────
  build-openvpn:
    name: Build openvpn image
    runs-on: ubuntu-latest
    needs: [test, lint]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/openvpn
          tags: |
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.openvpn
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── GitHub Release + Helm chart via GitHub Actions Pages ───────────────────
  # .tgz is attached to the GitHub Release (permanent storage).
  # Pages serves only index.yaml (~2 KB) referencing those release asset URLs.
  # No gh-pages branch needed — Pages source must be "GitHub Actions".
  release-and-chart:
    name: Release & Publish Chart
    runs-on: ubuntu-latest
    needs: [build-ovpn-admin, build-openvpn]
    if: github.ref_type == 'tag'
    permissions:
      contents: write   # create release + upload .tgz asset
      pages: write      # deploy to GitHub Pages
      id-token: write   # OIDC token required by deploy-pages
    env:
      CHART_VERSION: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.17.0

      - name: Package chart & create release
        run: |
          helm package charts/openvpn-admin \
            --version "$CHART_VERSION" \
            --app-version "$CHART_VERSION"

      - name: Create GitHub Release (with chart asset)
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: "openvpn-admin-*.tgz"

      - name: Fetch existing index.yaml
        env:
          PAGES_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: |
          mkdir -p pages chart-pkg
          mv openvpn-admin-*.tgz chart-pkg/
          curl -sf "$PAGES_URL/index.yaml" -o pages/index.yaml || true

      - name: Generate Helm repo index
        env:
          RELEASE_DOWNLOAD_URL: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}
        run: |
          if [ -f pages/index.yaml ]; then
            helm repo index chart-pkg \
              --url "$RELEASE_DOWNLOAD_URL" \
              --merge pages/index.yaml
          else
            helm repo index chart-pkg \
              --url "$RELEASE_DOWNLOAD_URL"
          fi
          cp chart-pkg/index.yaml pages/index.yaml

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: pages/

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
