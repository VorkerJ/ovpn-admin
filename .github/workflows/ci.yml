name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

env:
  REGISTRY: ghcr.io

jobs:
  # ── Tests ───────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Display coverage
        run: go tool cover -func=coverage.out

  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          args: --timeout=10m

  # ── Build ovpn-admin image ──────────────────────────────────────────────────
  build-ovpn-admin:
    name: Build ovpn-admin image
    runs-on: ubuntu-latest
    needs: [test, lint]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/ovpn-admin
          tags: |
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.ovpn-admin
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Build openvpn image ─────────────────────────────────────────────────────
  build-openvpn:
    name: Build openvpn image
    runs-on: ubuntu-latest
    needs: [test, lint]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/openvpn
          tags: |
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.openvpn
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── GitHub Release + Helm chart via GitHub Actions Pages ───────────────────
  # .tgz is attached to the GitHub Release (permanent storage).
  # Pages serves only index.yaml (~2 KB) referencing those release asset URLs.
  # No gh-pages branch needed — Pages source must be "GitHub Actions".
  release-and-chart:
    name: Release & Publish Chart
    runs-on: ubuntu-latest
    needs: [build-ovpn-admin, build-openvpn]
    if: github.ref_type == 'tag'
    permissions:
      contents: write   # create release + upload .tgz asset
      pages: write      # deploy to GitHub Pages
      id-token: write   # OIDC token required by deploy-pages
    env:
      CHART_VERSION: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.17.0

      - name: Package chart & create release
        run: |
          helm package charts/openvpn-admin \
            --version "$CHART_VERSION" \
            --app-version "$CHART_VERSION"

      - name: Create GitHub Release (with chart asset)
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: "openvpn-admin-*.tgz"

      - name: Fetch existing index.yaml
        env:
          PAGES_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: |
          mkdir -p pages chart-pkg
          mv openvpn-admin-*.tgz chart-pkg/
          curl -sf "$PAGES_URL/index.yaml" -o pages/index.yaml || true

      - name: Generate Helm repo index
        env:
          RELEASE_DOWNLOAD_URL: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}
        run: |
          if [ -f pages/index.yaml ]; then
            helm repo index chart-pkg \
              --url "$RELEASE_DOWNLOAD_URL" \
              --merge pages/index.yaml
          else
            helm repo index chart-pkg \
              --url "$RELEASE_DOWNLOAD_URL"
          fi
          cp chart-pkg/index.yaml pages/index.yaml

      - name: Generate index.html
        env:
          REPO_URL: https://github.com/${{ github.repository }}
        run: |
          cat > pages/index.html <<'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>ovpn-admin — OpenVPN Web UI for Kubernetes</title>
            <style>
              :root {
                --bg: #0d1117;
                --surface: #161b22;
                --border: #30363d;
                --text: #e6edf3;
                --text-muted: #8b949e;
                --accent: #58a6ff;
                --accent-hover: #79c0ff;
                --green: #3fb950;
                --card-bg: #1c2128;
              }
              * { box-sizing: border-box; margin: 0; padding: 0; }
              body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
                background: var(--bg);
                color: var(--text);
                line-height: 1.6;
              }
              a { color: var(--accent); text-decoration: none; }
              a:hover { color: var(--accent-hover); text-decoration: underline; }
              .container { max-width: 900px; margin: 0 auto; padding: 0 24px; }

              /* Hero */
              .hero {
                border-bottom: 1px solid var(--border);
                padding: 64px 0 48px;
                text-align: center;
              }
              .hero h1 {
                font-size: 2.8rem;
                font-weight: 700;
                letter-spacing: -0.5px;
                margin-bottom: 16px;
              }
              .hero h1 span { color: var(--accent); }
              .hero p {
                font-size: 1.15rem;
                color: var(--text-muted);
                max-width: 600px;
                margin: 0 auto 28px;
              }
              .hero-links { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
              .btn {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                padding: 10px 20px;
                border-radius: 6px;
                font-size: 0.9rem;
                font-weight: 600;
                transition: opacity 0.15s;
                cursor: pointer;
              }
              .btn:hover { opacity: 0.85; text-decoration: none; }
              .btn-primary { background: var(--accent); color: #0d1117; }
              .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }

              /* Badge */
              .version-badge {
                display: inline-block;
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 20px;
                padding: 4px 14px;
                font-size: 0.8rem;
                color: var(--green);
                margin-bottom: 20px;
                font-family: "SFMono-Regular", Consolas, monospace;
              }

              /* Features */
              .section { padding: 56px 0; border-bottom: 1px solid var(--border); }
              .section-title {
                font-size: 1.5rem;
                font-weight: 600;
                margin-bottom: 32px;
                text-align: center;
              }
              .features-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
                gap: 16px;
              }
              .feature-card {
                background: var(--card-bg);
                border: 1px solid var(--border);
                border-radius: 8px;
                padding: 20px 24px;
              }
              .feature-card .icon { font-size: 1.5rem; margin-bottom: 10px; }
              .feature-card h3 { font-size: 1rem; font-weight: 600; margin-bottom: 6px; }
              .feature-card p { font-size: 0.875rem; color: var(--text-muted); }

              /* Install */
              .steps { display: flex; flex-direction: column; gap: 24px; }
              .step { display: flex; gap: 20px; align-items: flex-start; }
              .step-num {
                flex-shrink: 0;
                width: 32px;
                height: 32px;
                border-radius: 50%;
                background: var(--accent);
                color: #0d1117;
                font-weight: 700;
                font-size: 0.9rem;
                display: flex;
                align-items: center;
                justify-content: center;
                margin-top: 4px;
              }
              .step-body h3 { font-size: 1rem; font-weight: 600; margin-bottom: 8px; }
              .step-body p { font-size: 0.875rem; color: var(--text-muted); margin-bottom: 10px; }
              pre {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 6px;
                padding: 16px;
                overflow-x: auto;
                font-size: 0.85rem;
                line-height: 1.5;
              }
              code { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; }
              pre code { color: var(--text); }
              .inline-code {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 4px;
                padding: 1px 6px;
                font-size: 0.85em;
                font-family: "SFMono-Regular", Consolas, monospace;
              }

              /* Config table */
              .config-table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
              .config-table th {
                background: var(--surface);
                padding: 10px 14px;
                text-align: left;
                color: var(--text-muted);
                font-weight: 600;
                border-bottom: 1px solid var(--border);
              }
              .config-table td {
                padding: 10px 14px;
                border-bottom: 1px solid var(--border);
                vertical-align: top;
              }
              .config-table tr:last-child td { border-bottom: none; }
              .config-table tr:hover td { background: var(--card-bg); }

              /* Footer */
              .footer {
                padding: 32px 0;
                text-align: center;
                font-size: 0.85rem;
                color: var(--text-muted);
              }
              .footer a { color: var(--text-muted); }
              .footer a:hover { color: var(--accent); }
            </style>
          </head>
          <body>

          <div class="hero">
            <div class="container">
              <div class="version-badge">&#x2713; Helm Chart Available</div>
              <h1><span>ovpn-admin</span></h1>
              <p>Simple web UI to manage OpenVPN users, certificates &amp; routes in Kubernetes.
                 PKI stored in K8s Secrets — no PVC required.</p>
              <div class="hero-links">
                <a href="REPO_URL_PLACEHOLDER" class="btn btn-primary">&#x2605; GitHub</a>
                <a href="REPO_URL_PLACEHOLDER/releases" class="btn btn-secondary">Releases</a>
                <a href="index.yaml" class="btn btn-secondary">index.yaml</a>
              </div>
            </div>
          </div>

          <div class="section">
            <div class="container">
              <div class="section-title">Features</div>
              <div class="features-grid">
                <div class="feature-card">
                  <div class="icon">&#x1F512;</div>
                  <h3>Web UI Authentication</h3>
                  <p>htpasswd-based login with bcrypt. Multi-admin support. Auto-generates password on first start.</p>
                </div>
                <div class="feature-card">
                  <div class="icon">&#x1F464;</div>
                  <h3>User Management</h3>
                  <p>Add, delete, revoke, restore, and rotate user certificates from a clean web interface.</p>
                </div>
                <div class="feature-card">
                  <div class="icon">&#x1F4C4;</div>
                  <h3>Config Generation</h3>
                  <p>Download ready-to-use <code class="inline-code">.ovpn</code> config files for each user instantly.</p>
                </div>
                <div class="feature-card">
                  <div class="icon">&#x2601;&#xFE0F;</div>
                  <h3>Kubernetes Native</h3>
                  <p>PKI stored in K8s Secrets (etcd). No persistent volume required.</p>
                </div>
                <div class="feature-card">
                  <div class="icon">&#x1F4CA;</div>
                  <h3>Prometheus Metrics</h3>
                  <p>Certificate expiry, connected users, per-user traffic — all exposed at <code class="inline-code">/metrics</code>.</p>
                </div>
                <div class="feature-card">
                  <div class="icon">&#x1F5FA;&#xFE0F;</div>
                  <h3>CCD &amp; Static IPs</h3>
                  <p>Per-user client-config-dir with static IP assignment and custom push routes.</p>
                </div>
              </div>
            </div>
          </div>

          <div class="section">
            <div class="container">
              <div class="section-title">Install via Helm</div>
              <div class="steps">
                <div class="step">
                  <div class="step-num">1</div>
                  <div class="step-body">
                    <h3>Add the Helm repository</h3>
                    <pre><code>helm repo add ovpn-admin https://vorkerj.github.io/ovpn-admin
          helm repo update</code></pre>
                  </div>
                </div>
                <div class="step">
                  <div class="step-num">2</div>
                  <div class="step-body">
                    <h3>Create admin password secret</h3>
                    <p>Create an htpasswd file and store it as a Kubernetes Secret:</p>
                    <pre><code>htpasswd -c -B /tmp/htpasswd admin
          kubectl create secret generic ovpn-admin-ui-auth \
            --from-file=htpasswd=/tmp/htpasswd -n vpn</code></pre>
                  </div>
                </div>
                <div class="step">
                  <div class="step-num">3</div>
                  <div class="step-body">
                    <h3>Install the chart</h3>
                    <pre><code>helm upgrade --install ovpn-admin ovpn-admin/openvpn-admin \
            --namespace vpn --create-namespace \
            --set ovpnAdmin.adminHtpasswdSecret=ovpn-admin-ui-auth</code></pre>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="section">
            <div class="container">
              <div class="section-title">Key Chart Values</div>
              <table class="config-table">
                <thead>
                  <tr>
                    <th>Parameter</th>
                    <th>Description</th>
                    <th>Default</th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td><code class="inline-code">ovpnAdmin.adminHtpasswdSecret</code></td>
                    <td>Secret name containing htpasswd file for admin UI</td>
                    <td><code class="inline-code">""</code></td>
                  </tr>
                  <tr>
                    <td><code class="inline-code">openvpn.network</code></td>
                    <td>VPN network CIDR</td>
                    <td><code class="inline-code">172.16.100.0/24</code></td>
                  </tr>
                  <tr>
                    <td><code class="inline-code">openvpn.proto</code></td>
                    <td>Protocol: <code class="inline-code">udp</code> or <code class="inline-code">tcp</code></td>
                    <td><code class="inline-code">udp</code></td>
                  </tr>
                  <tr>
                    <td><code class="inline-code">openvpn.port</code></td>
                    <td>OpenVPN listen port</td>
                    <td><code class="inline-code">1194</code></td>
                  </tr>
                  <tr>
                    <td><code class="inline-code">ingress.enabled</code></td>
                    <td>Enable Ingress for admin UI</td>
                    <td><code class="inline-code">false</code></td>
                  </tr>
                  <tr>
                    <td><code class="inline-code">ovpnAdmin.image.tag</code></td>
                    <td>Image tag (defaults to chart appVersion)</td>
                    <td><code class="inline-code">""</code></td>
                  </tr>
                </tbody>
              </table>
              <p style="margin-top:16px; font-size:0.875rem; color:var(--text-muted);">
                Full list: <a href="REPO_URL_PLACEHOLDER/blob/master/charts/openvpn-admin/values.yaml">charts/openvpn-admin/values.yaml</a>
              </p>
            </div>
          </div>

          <div class="footer">
            <div class="container">
              <p>
                <a href="REPO_URL_PLACEHOLDER">GitHub</a> &nbsp;·&nbsp;
                <a href="REPO_URL_PLACEHOLDER/releases">Releases</a> &nbsp;·&nbsp;
                <a href="index.yaml">index.yaml</a>
              </p>
              <p style="margin-top:8px;">ovpn-admin &mdash; originally by <a href="https://github.com/flant/">Flant</a>, maintained by <a href="https://github.com/VorkerJ">VorkerJ</a></p>
            </div>
          </div>

          </body>
          </html>
          HTMLEOF
          sed -i "s|REPO_URL_PLACEHOLDER|${REPO_URL}|g" pages/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: pages/

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
